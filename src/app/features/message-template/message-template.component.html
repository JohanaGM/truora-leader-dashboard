<div class="message-template-grid" [formGroup]="form">
  <div class="users-column">
    <label class="select-all">
      <input type="checkbox" formControlName="selectAll" (change)="toggleSelectAll()" />
      Seleccionar todos
    </label>
    <div class="chips improved-chips">
      <ng-container *ngFor="let user of users; let i = index">
        <label class="chip improved-chip">
          <input type="checkbox" [formControl]="getUserControl(i)" (change)="onUserChange(i)" />
          <span>{{ user.name }}</span>
        </label>
      </ng-container>
    </div>
  </div>
  <div class="templates-column">
    <div class="template-cards">
      <ng-container *ngFor="let t of templates">
        <div class="template-btn-wrapper" [class.has-link]="t.url">
          <button
            [ngClass]="{active: activeTemplate === t.key}"
            (click)="selectTemplate(t.key)"
            type="button"
          >
            <span class="icon">{{ t.icon }}</span> {{ t.label }}
          </button>

          <div class="ticket-tooltip" *ngIf="t.url">
            <div class="tooltip-header">
              <span class="tooltip-icon">🎫</span>
              <span class="tooltip-title">Tickets Escalados</span>
            </div>
            <p class="tooltip-desc">Revisa y gestiona los tickets escalados directamente en el portal de soporte de Truora.</p>
            <a [href]="t.url" target="_blank" rel="noopener noreferrer" class="tooltip-link">
              <span>Ir al Portal de Soporte</span>
              <span class="arrow">→</span>
            </a>
          </div>
        </div>
      </ng-container>
    </div>
  </div>
</div>
